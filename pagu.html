<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pencarian Data</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    .search-input:focus { box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3); }
    .data-row { animation: fadeIn 0.3s ease-out forwards; opacity: 0; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .loader { 
      border: 3px solid #e5e7eb;
      border-top-color: #6366f1;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 overflow-auto">
  <div class="min-h-full w-full p-6 md:p-10">
   <!-- Header -->
   <header class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-2xl mb-4 shadow-lg shadow-indigo-500/30">
     <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
     </svg>
    </div>
    <h1 id="page-title" class="text-3xl md:text-4xl font-bold text-white mb-2">Pencarian Data</h1>
    <p class="text-slate-400">Cari data dengan cepat dan mudah</p>
   </header><!-- Search Box -->
   <div class="max-w-2xl mx-auto mb-8">
    <div class="relative">
     <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewbox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
     </svg><input type="text" id="search-input" placeholder="Ketik untuk mencari..." class="search-input w-full pl-12 pr-4 py-4 bg-slate-800/80 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition-all"> <button id="clear-btn" class="hidden absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
       <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg></button>
    </div>
   </div><!-- Stats -->
   <div class="max-w-4xl mx-auto mb-6 flex items-center justify-between">
    <p id="result-count" class="text-slate-400 text-sm">Memuat data...</p>
    <div id="loading-indicator" class="flex items-center gap-2 text-indigo-400">
     <div class="loader w-4 h-4 rounded-full"></div><span class="text-sm">Memuat...</span>
    </div>
   </div><!-- Data Table -->
   <div class="max-w-4xl mx-auto bg-slate-800/50 backdrop-blur rounded-2xl border border-slate-700/50 overflow-hidden shadow-xl">
    <div class="overflow-x-auto">
     <table class="w-full">
      <thead id="table-header" class="bg-slate-800/80">
       <!-- Headers will be inserted here -->
      </thead>
      <tbody id="table-body" class="divide-y divide-slate-700/50">
       <!-- Data rows will be inserted here -->
      </tbody>
     </table>
    </div><!-- Empty State -->
    <div id="empty-state" class="hidden py-16 text-center">
     <svg class="w-16 h-16 mx-auto text-slate-600 mb-4" fill="none" stroke="currentColor" viewbox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
     </svg>
     <p class="text-slate-400 text-lg">Tidak ada data ditemukan</p>
     <p class="text-slate-500 text-sm mt-1">Coba kata kunci lain</p>
    </div><!-- Error State -->
    <div id="error-state" class="hidden py-16 text-center">
     <svg class="w-16 h-16 mx-auto text-red-500 mb-4" fill="none" stroke="currentColor" viewbox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
     </svg>
     <p class="text-red-400 text-lg">Gagal memuat data</p>
     <p class="text-slate-500 text-sm mt-1">Periksa koneksi internet Anda</p><button id="retry-btn" class="mt-4 px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition-colors"> Coba Lagi </button>
    </div>
   </div><!-- Footer -->
   <footer class="text-center mt-8 text-slate-500 text-sm">
    Data bersumber dari Google Sheets
   </footer>
  </div><!-- Modal Detail -->
  <div id="detail-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
   <div class="bg-slate-800 rounded-2xl border border-slate-700 max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-2xl"><!-- Modal Header -->
    <div class="sticky top-0 bg-gradient-to-r from-indigo-600 to-indigo-700 px-6 py-4 border-b border-indigo-500/30 flex items-center justify-between">
     <h2 id="modal-title" class="text-2xl font-bold text-white">Rincian Data</h2><button id="close-modal" class="text-white hover:bg-white/10 p-2 rounded-lg transition-colors">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24">
       <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg></button>
    </div><!-- Modal Content -->
    <div id="modal-content" class="p-6 space-y-4"><!-- Content will be populated here -->
    </div>
   </div>
  </div>
  <script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT0kI32ixPnmJHohfEJUjwx42wPn5v6jYFZcRnOfHUmdP9U5XeTDpo_DeIcGQnhYA/pub?gid=1242131144&single=true&output=csv';
    
    let allData = [];
    let headers = [];
    
    const defaultConfig = {
      search_title: 'Pencarian Data',
      search_placeholder: 'Ketik untuk mencari...',
      primary_color: '#6366f1',
      background_color: '#0f172a',
      text_color: '#ffffff',
      surface_color: '#1e293b',
      accent_color: '#818cf8'
    };

    // Parse CSV
    function parseCSV(csv) {
      const lines = csv.split('\n').filter(line => line.trim());
      if (lines.length === 0) return { headers: [], data: [] };
      
      const parseRow = (row) => {
        const result = [];
        let current = '';
        let inQuotes = false;
        
        for (let i = 0; i < row.length; i++) {
          const char = row[i];
          if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === ',' && !inQuotes) {
            result.push(current.trim());
            current = '';
          } else {
            current += char;
          }
        }
        result.push(current.trim());
        return result;
      };
      
      const headers = parseRow(lines[0]);
      const data = lines.slice(1).map(line => {
        const values = parseRow(line);
        const obj = {};
        headers.forEach((header, i) => {
          obj[header] = values[i] || '';
        });
        return obj;
      });
      
      return { headers, data };
    }

    // Fetch data from Google Sheets
    async function fetchData() {
      const loadingIndicator = document.getElementById('loading-indicator');
      const errorState = document.getElementById('error-state');
      const tableBody = document.getElementById('table-body');
      
      loadingIndicator.classList.remove('hidden');
      errorState.classList.add('hidden');
      tableBody.innerHTML = '';
      
      try {
        const response = await fetch(SHEET_URL);
        if (!response.ok) throw new Error('Network error');
        
        const csv = await response.text();
        const parsed = parseCSV(csv);
        
        headers = parsed.headers;
        allData = parsed.data;
        
        renderHeaders();
        renderData(allData);
        
      } catch (error) {
        console.error('Failed to fetch data:', error);
        errorState.classList.remove('hidden');
        document.getElementById('result-count').textContent = 'Gagal memuat data';
      } finally {
        loadingIndicator.classList.add('hidden');
      }
    }

    // Render table headers
    function renderHeaders() {
      const tableHeader = document.getElementById('table-header');
      tableHeader.innerHTML = `
        <tr>
          ${headers.map(h => `
            <th class="px-6 py-4 text-left text-xs font-semibold text-indigo-300 uppercase tracking-wider">${escapeHtml(h)}</th>
          `).join('')}
        </tr>
      `;
    }

    // Render data rows
    function renderData(data) {
      const tableBody = document.getElementById('table-body');
      const emptyState = document.getElementById('empty-state');
      const resultCount = document.getElementById('result-count');
      
      if (data.length === 0) {
        tableBody.innerHTML = '';
        emptyState.classList.remove('hidden');
        resultCount.textContent = 'Tidak ada hasil';
        return;
      }
      
      emptyState.classList.add('hidden');
      resultCount.textContent = `Menampilkan ${data.length} data`;
      
      tableBody.innerHTML = data.map((row, index) => `
        <tr class="data-row hover:bg-slate-700/30 transition-colors cursor-pointer" style="animation-delay: ${index * 30}ms" data-row-index="${index}" onclick="openDetailModal(${index}, this)">
          ${headers.map(h => `
            <td class="px-6 py-4 text-sm text-slate-300 whitespace-nowrap">${escapeHtml(row[h] || '-')}</td>
          `).join('')}
        </tr>
      `).join('');
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Search function
    function searchData(query) {
      if (!query.trim()) {
        renderData(allData);
        return;
      }
      
      const lowerQuery = query.toLowerCase();
      const filtered = allData.filter(row => {
        return Object.values(row).some(value => 
          String(value).toLowerCase().includes(lowerQuery)
        );
      });
      
      renderData(filtered);
    }

    // Event listeners
    const searchInput = document.getElementById('search-input');
    const clearBtn = document.getElementById('clear-btn');
    const retryBtn = document.getElementById('retry-btn');
    const detailModal = document.getElementById('detail-modal');
    const closeModalBtn = document.getElementById('close-modal');

    searchInput.addEventListener('input', (e) => {
      const value = e.target.value;
      clearBtn.classList.toggle('hidden', !value);
      searchData(value);
    });

    clearBtn.addEventListener('click', () => {
      searchInput.value = '';
      clearBtn.classList.add('hidden');
      renderData(allData);
      searchInput.focus();
    });

    retryBtn.addEventListener('click', fetchData);

    // Copy to clipboard function
    function copyToClipboard(text, button) {
      const originalHTML = button.innerHTML;
      
      navigator.clipboard.writeText(text).then(() => {
        // Ubah icon ke centang hijau
        button.innerHTML = '<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"></path></svg>';
        button.classList.remove('text-slate-400', 'hover:text-indigo-400');
        button.classList.add('text-green-400');
        
        // Kembalikan ke icon salin setelah 2 detik
        setTimeout(() => {
          button.innerHTML = originalHTML;
          button.classList.remove('text-green-400');
          button.classList.add('text-slate-400', 'hover:text-indigo-400');
        }, 2000);
      }).catch(err => {
        console.error('Gagal menyalin:', err);
      });
    }

    // Modal functions
    function openDetailModal(rowIndex, rowElement) {
      const currentData = Array.from(document.querySelectorAll('#table-body tr')).map(tr => {
        const cells = tr.querySelectorAll('td');
        const obj = {};
        headers.forEach((h, i) => {
          obj[h] = cells[i]?.textContent || '';
        });
        return obj;
      });
      
      const selectedRow = currentData[rowIndex];
      if (!selectedRow) return;
      
      const modalContent = document.getElementById('modal-content');
      const firstColumn = headers[0] || 'Data';
      
      modalContent.innerHTML = headers.map(header => `
        <div class="bg-slate-700/30 rounded-lg p-4 border border-slate-600/30 flex items-start justify-between gap-4">
          <div class="flex-1">
            <label class="text-xs font-semibold text-indigo-300 uppercase tracking-wider block mb-2">${escapeHtml(header)}</label>
            <p class="text-slate-200 text-base break-words">${escapeHtml(selectedRow[header] || '-')}</p>
          </div>
          <button class="flex-shrink-0 mt-1 p-2 hover:bg-slate-600/50 rounded-lg transition-colors text-slate-400 hover:text-indigo-400 group" onclick="copyToClipboard('${escapeHtml(selectedRow[header] || '-').replace(/'/g, "\\'")}', this)" title="Salin teks">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
            </svg>
          </button>
        </div>
      `).join('');
      
      document.getElementById('modal-title').textContent = `Rincian: ${escapeHtml(selectedRow[firstColumn] || 'Detail Data')}`;
      detailModal.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    closeModalBtn.addEventListener('click', () => {
      detailModal.classList.add('hidden');
      document.body.style.overflow = 'auto';
    });

    detailModal.addEventListener('click', (e) => {
      if (e.target === detailModal) {
        detailModal.classList.add('hidden');
        document.body.style.overflow = 'auto';
      }
    });

    // Close modal with Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !detailModal.classList.contains('hidden')) {
        detailModal.classList.add('hidden');
        document.body.style.overflow = 'auto';
      }
    });

    // Element SDK initialization
    async function onConfigChange(config) {
      const title = config.search_title || defaultConfig.search_title;
      const placeholder = config.search_placeholder || defaultConfig.search_placeholder;
      
      document.getElementById('page-title').textContent = title;
      document.getElementById('search-input').placeholder = placeholder;
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ['search_title', config.search_title || defaultConfig.search_title],
        ['search_placeholder', config.search_placeholder || defaultConfig.search_placeholder]
      ]);
    }

    // Initialize
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }

    // Fetch data on load
    fetchData();
  </script>
