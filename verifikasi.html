<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/di8stbg60/image/upload/v1763356194/Lambang_Kabupaten_Donggala_1_cvywgs.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner TTE Kabupaten Donggala</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <!-- Library QR Scanner -->
    <script src="https://unpkg.com"></script>
    <style>
        :root { --primary: #00c853; --bg: #0f172a; --card-bg: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        .container { max-width: 450px; width: 100%; }
        
        /* Scanner Style */
        #reader { width: 100%; border-radius: 15px; overflow: hidden; border: 2px solid var(--primary) !important; background: #000; margin-bottom: 20px; }
        
        .verification-card {
            background: var(--card-bg); padding: 2rem; border-radius: 24px;
            text-align: center; position: relative; border: 1px solid rgba(255,255,255,0.1);
            display: none; /* Sembunyi sampai QR discan */
        }

        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--primary); box-shadow: 0 0 15px var(--primary); animation: scan 3s infinite; }
        @keyframes scan { 0%, 100% { top: 0%; } 50% { top: 100%; } }

        .details { background: rgba(15, 23, 42, 0.5); padding: 1rem; border-radius: 12px; text-align: left; margin: 1rem 0; font-size: 0.85rem; }
        .details div { margin-bottom: 8px; display: flex; justify-content: space-between; }
        
        .btn { background: var(--primary); color: white; padding: 12px; border-radius: 10px; border: none; width: 100%; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-reset { background: #64748b; margin-top: 15px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center; margin-bottom: 20px;">
        <img src="https://res.cloudinary.com" height="60">
        <h3>Scanner Verifikasi TTE</h3>
        <p style="font-size: 0.8rem; color: #94a3b8;">Arahkan kamera ke QR Code Dokumen</p>
    </div>

    <!-- Area Scanner -->
    <div id="reader"></div>

    <!-- Area Hasil Verifikasi -->
    <div id="result-card" class="verification-card">
        <div class="scan-line"></div>
        <div style="color: var(--primary); font-size: 2rem; margin-bottom: 10px;">✓</div>
        <h3 style="margin:0">Dokumen Valid</h3>
        <div class="details">
            <div><span style="color:#64748b">Penandatangan:</span> <b id="res-nama">-</b></div>
            <div><span style="color:#64748b">ID Sertifikat:</span> <b id="res-id">-</b></div>
            <div><span style="color:#64748b">Waktu:</span> <b id="res-waktu">-</b></div>
        </div>
        <button class="btn" onclick="generatePDF()">Unduh Sertifikat PDF</button>
        <button class="btn btn-reset" onclick="location.reload()">Scan Ulang</button>
    </div>
</div>

<script>
    const html5QrCode = new Html5Qrcode("reader");
    const config = { fps: 10, qrbox: { width: 250, height: 250 } };

    // Mulai Kamera
    html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);

    function onScanSuccess(decodedText, decodedResult) {
        // Hentikan scanner setelah berhasil scan
        html5QrCode.stop();
        document.getElementById('reader').style.display = 'none';
        document.getElementById('result-card').style.display = 'block';

        // Simulasi Parsing Data (Biasanya data QR berisi ID atau Link)
        // Di sini kita set data otomatis untuk demo
        document.getElementById('res-nama').innerText = "Syamsuddin";
        document.getElementById('res-id').innerText = decodedText; // Mengambil data dari QR
        document.getElementById('res-waktu').innerText = new Date().toLocaleString('id-ID') + " WITA";
        
        alert("Scan Berhasil: " + decodedText);
    }

    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const imgUrl = "https://res.cloudinary.com";

        doc.addImage(imgUrl, 'PNG', 90, 15, 30, 35);
        doc.setFont("helvetica", "bold");
        doc.text("PEMERINTAH KABUPATEN DONGGALA", 105, 60, { align: "center" });
        doc.setFontSize(10);
        doc.text("Hasil Verifikasi Tanda Tangan Elektronik", 105, 67, { align: "center" });
        doc.line(20, 75, 190, 75);
        
        doc.setFont("helvetica", "normal");
        doc.text("ID Dokumen: " + document.getElementById('res-id').innerText, 20, 90);
        doc.text("Penandatangan: " + document.getElementById('res-nama').innerText, 20, 100);
        doc.text("Waktu Scan: " + document.getElementById('res-waktu').innerText, 20, 110);
        doc.text("Status: ASLI & TERVERIFIKASI SISTEM", 20, 120);

        doc.save("Sertifikat_Verifikasi_Donggala.pdf");
    }
</script>

</body>
</html>
